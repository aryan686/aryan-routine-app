<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aryan Ultimate Routine</title>

<!-- 🔥 FIREBASE ADDED -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js"></script>

<style>
/* ✅ TERA SAME CSS (UNCHANGED) */
body{
margin:0;
font-family:-apple-system;
background:linear-gradient(135deg,#fff,#f5f0e6);
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn 0.6s;
}

.login-box h2{ color:#c9a646; }

.login-box input{
padding:12px;
width:220px;
border-radius:12px;
border:1px solid #ddd;
}

.login-box button{
margin-top:15px;
padding:10px 30px;
background:#c9a646;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 60px;
background:#c9a646;
color:white;
font-size:24px;
border-radius:25px;
opacity:0;
transition:0.5s;
z-index:999;
}

.show{ opacity:1; }

/* APP */
#app{
display:none;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
font-size:32px;
color:#c9a646;
text-shadow:0 0 10px gold;
}

/* TIME */
#time{
position:absolute;
top:10px;
right:20px;
}

/* STREAK */
#streak{
position:absolute;
top:60px;
right:20px;
background:#fff3cd;
padding:10px 20px;
border-radius:20px;
box-shadow:0 0 15px gold;
}

/* TASK */
.task{
background:white;
padding:15px;
margin:10px auto;
width:80%;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.task:hover{ transform:scale(1.02); }

.sub{
max-height:0;
overflow:hidden;
transition:0.4s;
margin-left:20px;
}

/* CHECK */
.check{
display:flex;
align-items:center;
gap:10px;
margin:5px 0;
}

.box{
width:18px;
height:18px;
border:2px solid black;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.checked::after{
content:"✔";
color:green;
}

/* DONE BUTTON */
#doneBtn{
display:none;
text-align:center;
margin-top:20px;
}

#doneBtn button{
padding:12px 25px;
background:#c9a646;
color:white;
border:none;
border-radius:12px;
}

/* QUOTE */
#quote{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:10px 20px;
border-radius:15px;
box-shadow:0 0 10px #ccc;
max-width:300px;
font-size:14px;
display:none;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:scale(0.9)}
to{opacity:1;transform:scale(1)}
}
</style>
</head>

<body>

<div id="popup" class="popup"></div>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>Enter Your Name</h2>
<input id="name">
<br>
<button onclick="login()">Enter</button>
</div>
</div>

<!-- APP -->
<div id="app">

<!-- 🔥 NEW ALARM PANEL (ADD ONLY — NOTHING REMOVED) -->
<div style="text-align:center;margin-bottom:10px;">
<input type="time" id="alarmTime">
<button onclick="setAlarm()">Set Alarm ⏰</button>
</div>

<div class="header">To Do List ✔</div>
<div id="time"></div>
<div id="streak">🔥 0</div>

<!-- TASKS SAME (UNCHANGED) -->
<div class="task" onclick="toggle('a')">Wake Up (5 AM)
<div id="a" class="sub">
<div class="check"><div class="box" onclick="tick(this)"></div>No Snooze</div>
<div class="check"><div class="box" onclick="tick(this)"></div>Water</div>
</div></div>

<div class="task" onclick="toggle('b')">Fresh + Bath
<div id="b" class="sub">
<div class="check"><div class="box" onclick="tick(this)"></div>Brush</div>
<div class="check"><div class="box" onclick="tick(this)"></div>Bath</div>
</div></div>

<div class="task" onclick="toggle('c')">Running (6–7 AM)
<div id="c" class="sub">
<div class="check"><div class="box" onclick="tick(this)"></div>Running</div>
</div></div>

<div class="task" onclick="toggle('d')">Exercise + Yoga
<div id="d" class="sub">
<div class="check"><div class="box" onclick="tick(this)"></div>Height Exercise</div>
<div class="check"><div class="box" onclick="tick(this)"></div>Yoga</div>
</div></div>

<div class="task" onclick="toggle('e')">Study (8–11 AM)
<div id="e" class="sub">
<div class="check"><div class="box" onclick="tick(this)"></div>Physics</div>
<div class="check"><div class="box" onclick="tick(this)"></div>Chemistry</div>
<div class="check"><div class="box" onclick="tick(this)"></div>Biology</div>
<div class="check"><div class="box" onclick="tick(this)"></div>Maths</div>
<div class="check"><div class="box" onclick="tick(this)"></div>GK/GS</div>
</div></div>

<div class="task" onclick="toggle('f')">Coding
<div id="f" class="sub">
<div class="check"><div class="box" onclick="tick(this)"></div>Python</div>
<div class="check"><div class="box" onclick="tick(this)"></div>Skills</div>
</div></div>

<div class="task" onclick="toggle('g')">Night (10–11 PM)
<div id="g" class="sub">
<div class="check"><div class="box" onclick="tick(this)"></div>Sleep</div>
</div></div>

<div id="doneBtn">
<button onclick="done()">Done</button>
</div>

</div>

<div id="quote"></div>

<script>

/* 🔥 FIREBASE SAME */
const firebaseConfig = {
apiKey: "AIzaSyARfGVJuI_xTmWkWZLcHY-ia783a8lcDVg",
authDomain: "aryan-routine-app.firebaseapp.com",
projectId: "aryan-routine-app",
storageBucket: "aryan-routine-app.firebasestorage.app",
messagingSenderId: "418648573101",
appId: "1:418648573101:web:873efcc955beb820657224",
measurementId: "G-D82HSCHL2W"
};
firebase.initializeApp(firebaseConfig);

/* SOUND */
const sound=new Audio("https://www.fesliyanstudios.com/play-mp3/387");

/* 🔥 SOUND FIX ADD */
document.addEventListener("click",()=>{
try{sound.currentTime=0;}catch(e){}
});

/* 🔥 NOTIFICATION PERMISSION ADD */
if("Notification" in window){
Notification.requestPermission();
}

/* LOGIN SAME */
function login(){
let name=document.getElementById("name").value;

if(name==="Aryan"){
showPopup("ACCESS GRANTED");

setTimeout(()=>{
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

loadQuote();
document.getElementById("quote").style.display="block";

loadTasks();
startReminders();

},1500);

}else{
showPopup("ACCESS DENIED");
}
}

/* POPUP SAME */
function showPopup(msg){
let p=document.getElementById("popup");
p.innerText=msg;
p.classList.add("show");
setTimeout(()=>p.classList.remove("show"),1500);
}

/* TIME SAME */
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleString();
},1000);

/* TOGGLE SAME */
function toggle(id){
let el=document.getElementById(id);
el.style.maxHeight = el.style.maxHeight ? null : el.scrollHeight+"px";
}

/* SAVE + LOAD SAME */
function saveTasks(){
let arr=[];
document.querySelectorAll(".box").forEach(b=>{
arr.push(b.classList.contains("checked"));
});
localStorage.setItem("tasks",JSON.stringify(arr));
}

function loadTasks(){
let arr=JSON.parse(localStorage.getItem("tasks")||"[]");
document.querySelectorAll(".box").forEach((b,i)=>{
if(arr[i]) b.classList.add("checked");
});
}

/* TICK SAME */
function tick(el){
event.stopPropagation();
try{sound.currentTime=0;sound.play();}catch(e){}
el.classList.toggle("checked");
saveTasks();
checkAll();
}

/* CHECK SAME */
function checkAll(){
let all=document.querySelectorAll(".box");
let done=true;

all.forEach(b=>{
if(!b.classList.contains("checked")) done=false;
});

if(done){
document.getElementById("doneBtn").style.display="block";
localStorage.setItem("allDone","true");
sendNotification("All Tasks Done 🔥","Great job Aryan!");
}
}

/* NOTIFICATION SAME */
function sendNotification(title,body){
if(Notification.permission==="granted"){
new Notification(title,{body:body});
}else{
alert(title+" - "+body);
}
}

/* DONE SAME */
function done(){
showPopup("Streak will count at 11 PM");
}

/* STREAK SAME */
function checkStreak(){
let now=new Date();
let hour=now.getHours();

if(hour>=23 && localStorage.getItem("allDone")==="true"){
let streak=Number(localStorage.getItem("streak")||0);
streak++;
localStorage.setItem("streak",streak);
localStorage.setItem("allDone","false");
}

document.getElementById("streak").innerText="🔥 "+(localStorage.getItem("streak")||0);
}
setInterval(checkStreak,60000);

/* REMINDER SAME */
function startReminders(){
setInterval(()=>{
let now=new Date();
let h=now.getHours();
let m=now.getMinutes();

if(h===5 && m===0) alert("Wake Up ⏰");
if(h===6 && m===0) alert("Running 🏃");
if(h===8 && m===0) alert("Study 📚");
if(h===22 && m===0) alert("Sleep 😴");

},60000);
}

/* 🔥 ALARM SYSTEM ADD */
let alarmTime=null;

function setAlarm(){
alarmTime=document.getElementById("alarmTime").value;
alert("Alarm set for "+alarmTime);
}

setInterval(()=>{
if(alarmTime){
let now=new Date();
let current=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");

if(current===alarmTime){
alert("⏰ Alarm Ringing!");
alarmTime=null;
}
}
},1000);

/* QUOTES SAME + ADD */
const baseQuotes=[
"Discipline equals freedom. — Jocko Willink",
"Stay hungry, stay foolish. — Steve Jobs",
"Consistency transforms excellence. — Tony Robbins",
"It always seems impossible until it's done. — Nelson Mandela",
"Dream big and dare to fail. — Norman Vaughan",
"Your only limit is your mind. — Elon Musk"
];

let quotes=[];
for(let i=0;i<100;i++){
quotes.push(...baseQuotes);
}

/* EXTRA ADD */
quotes.push(
"Push yourself daily",
"Focus on your goal",
"Success starts now",
"Be unstoppable"
);

/* LOAD */
function loadQuote(){
let index=Math.floor(Math.random()*quotes.length);
document.getElementById("quote").innerText=quotes[index];
}

/* AUTO */
setInterval(loadQuote,8000);

/* FORCE LOAD */
window.addEventListener("load",()=>{
loadQuote();
document.getElementById("quote").style.display="block";
});

</script>

</body>
</html>
